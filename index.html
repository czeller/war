<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="css/style.css" />
<script src="https://cdn.jsdelivr.net/npm/vue/dist/vue.js"></script>
</head>
<body>

<div id="app" style="display:flex;">
	<button v-on:click="deal" v-if="this.deck.length > 0">Deal</button>

	<player v-bind="player1" v-on:player-clicked-card="playCard('player1')" v-on:player-hand-empty="examinePlayerHand('player1')"></player>
	<player v-bind="player2" v-on:player-hand-empty="examinePlayerHand('player2')"></player>

	<div class="playing-table" style="display:flex;">
		<div id="warcard-player1">
			You
			<div class="cards">
				<span v-if="warZone.player1.length === 0">
					Player 1 play card
				</span>
				<card v-for="card in warZone.player1" v-bind="card"></card>
			</div>
		</div>

		<div id="warcard-player2">
			CPU
			<div class="cards">
				<span v-if="warZone.player2.length === 0">
					CPU play card
				</span>
				<card v-for="card in warZone.player2" v-bind="card"></card>
			</div>
		</div>
	</div>

	<!--
	<div id="output">
		<card v-for="card in deck" v-bind:suit="card.suit" v-bind:value="card.value"></card>
	</div>
	 -->
</div>

<script src="js/app.js"></script>

</body>
</html>
