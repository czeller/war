<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="css/style.css" />
<script src="https://cdn.jsdelivr.net/npm/vue/dist/vue.js"></script>
</head>
<body>

<div id="app">
	<button v-on:click="deal" v-if="this.deck.length > 0">Deal</button>

	<div class="player">
		Player 1 (You)
		<div id="player1">
			<div class="hand" style="position:relative;" v-on:click="playCard('player1')">
				<div style="position:absolute; z-index:1">{{player1.hand.length}}</div>
				<card v-for="card in player1.hand" v-bind:suit="card.suit" v-bind:value="card.value"></card>
			</div>
			<div class="winPile"></div>
		</div>
	</div>

	<div class="player">
		Player 2 (CPU)
		<div id="player2">
			<div class="hand" style="position:relative;">
				<div style="position:absolute; z-index:1">{{player2.hand.length}}</div>
				<card v-for="card in player2.hand" v-bind:suit="card.suit" v-bind:value="card.value"></card>
			</div>
			<div class="winPile"></div>
		</div>
	</div>

	<div class="playing-table">
		<div class="cards" id="warcard-player1">
			<card v-for="card in player1.playedCards" v-bind:suit="card.suit" v-bind:value="card.value" v-bind:revealed=true></card>
		</div>

		<div class="cards" id="warcard-player2">
			<card v-for="card in player2.playedCards" v-bind:suit="card.suit" v-bind:value="card.value" v-bind:revealed=true></card>
		</div>
	</div>

	<!--
	<div id="output">
		<card v-for="card in deck" v-bind:suit="card.suit" v-bind:value="card.value"></card>
	</div>
	 -->
</div>

<script src="js/app.js"></script>

</body>
</html>
